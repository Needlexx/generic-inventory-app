/* =================================================================
   REALTIME — live updates across devices via Supabase Realtime
   ================================================================= */
let realtimeChannels = [];

function subscribeToRealtime() {
  // Clean up any existing subscriptions first
  unsubscribeRealtime();

  const itemsCh = sb.channel('realtime-items')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' }, handleItemsChange)
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] items channel ready');
      if (status === 'CHANNEL_ERROR') console.warn('[Realtime] items channel error');
    });

  const txnCh = sb.channel('realtime-txns')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, handleTxnChange)
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] transactions channel ready');
      if (status === 'CHANNEL_ERROR') console.warn('[Realtime] transactions channel error');
    });

  // Stock count submissions — ASM sees new Welfare submissions instantly,
  // and Welfare devices see a submission leave the queue when ASM applies/dismisses it.
  const stockCountCh = sb.channel('realtime-stock-counts')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'stock_counts' }, handleStockCountChange)
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] stock_counts channel ready');
      if (status === 'CHANNEL_ERROR') console.warn('[Realtime] stock_counts channel error');
    });

  // Delivery submissions — ASM sees new Welfare deliveries instantly.
  const deliveriesCh = sb.channel('realtime-deliveries')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'deliveries' }, handleDeliveryChange)
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] deliveries channel ready');
      if (status === 'CHANNEL_ERROR') console.warn('[Realtime] deliveries channel error');
    });

  realtimeChannels = [itemsCh, txnCh, stockCountCh, deliveriesCh];
}

function unsubscribeRealtime() {
  realtimeChannels.forEach(ch => { try { sb.removeChannel(ch); } catch(e){} });
  realtimeChannels = [];
}

function handleItemsChange(payload) {
  const items = getItems();
  if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
    const r = payload.new;
    const item = {
      id: r.id, name: r.name, category: r.category, quantity: r.quantity,
      unit: r.unit, minStock: r.min_stock, maxStock: r.max_stock,
      productCode: r.product_code, dateAdded: r.created_at
    };
    const idx = items.findIndex(i => i.id === r.id);
    if (idx >= 0) items[idx] = item; else items.push(item);
  } else if (payload.eventType === 'DELETE') {
    const id = payload.old && payload.old.id;
    if (!id) return;
    const idx = items.findIndex(i => i.id === id);
    if (idx >= 0) items.splice(idx, 1);
  }
  localStorage.setItem(KEYS.items, JSON.stringify(items));
  // Re-render whichever tab is currently active
  refreshActiveTab();
}

function handleTxnChange(payload) {
  const txns = getTransactions();
  if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
    const r = payload.new;
    const txn = {
      id: r.id, userName: r.user_name, userRoom: r.user_room, staffName: r.staff_name,
      items: r.items, notes: r.notes, photoPath: r.photo_path, date: r.created_at
    };
    const idx = txns.findIndex(t => t.id === r.id);
    if (idx >= 0) txns[idx] = txn; else txns.unshift(txn);
  } else if (payload.eventType === 'DELETE') {
    const id = payload.old && payload.old.id;
    if (!id) return;
    const idx = txns.findIndex(t => t.id === id);
    if (idx >= 0) txns.splice(idx, 1);
  }
  localStorage.setItem(KEYS.transactions, JSON.stringify(txns));
  refreshActiveTab();
}

function handleStockCountChange(payload) {
  // Any change to pending queue — refresh ASM's banner, and toast new arrivals
  if (!isASM()) return;
  if (payload.eventType === 'INSERT' && payload.new && payload.new.status === 'pending') {
    const who = (payload.new.submitted_by || 'staff');
    toast(`New stock count submitted by ${who}`, 'success');
  }
  try { refreshPendingSubmissionsBanner(); } catch (e) { console.warn('Banner refresh failed:', e); }
}

function refreshActiveTab() {
  const stock = document.getElementById('pageStock');
  const count = document.getElementById('pageCount');
  const hist = document.getElementById('pageHistory');
  const dash = document.getElementById('pageDashboard');
  if (stock && stock.classList.contains('active')) { renderInventory(); renderCategoryPills(); }
  if (count && count.classList.contains('active')) renderCount();
  if (hist && hist.classList.contains('active')) renderHistory();
  if (dash && dash.classList.contains('active')) renderDashboard();
}

/* =================================================================
   PHOTOS — upload to Supabase Storage, compressed
   ================================================================= */
async function compressPhotoDataUrl(dataUrl, maxEdge = 1200, quality = 0.8) {
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = dataUrl;
  });
  const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return new Promise(resolve => canvas.toBlob(b => resolve(b), 'image/jpeg', quality));
}

async function uploadPhotoToCloud(dataUrl, txnId) {
  // Verify auth first — expired sessions cause cryptic 401s
  const { data: { session } } = await sb.auth.getSession();
  if (!session) throw new Error('Not signed in. Please sign out and sign back in.');

  const blob = await compressPhotoDataUrl(dataUrl);
  if (!blob) throw new Error('Could not compress photo — file may be corrupt.');

  const path = `${txnId}.jpg`;
  const { error } = await sb.storage.from(PHOTO_BUCKET).upload(path, blob, {
    contentType: 'image/jpeg',
    upsert: true
  });

  if (error) {
    console.error('Supabase upload error:', error);
    const m = ((error.message || '') + ' ' + (error.statusCode || '')).toLowerCase();
    if (m.includes('bucket not found') || m.includes('404')) {
      throw new Error(`Storage bucket "${PHOTO_BUCKET}" missing. Create it in Supabase dashboard → Storage → New bucket (private).`);
    }
    if (m.includes('row-level security') || m.includes('policy') || m.includes('403') || m.includes('permission') || m.includes('unauthorized') || m.includes('authorized')) {
      throw new Error('Storage permissions missing. Re-run the "STORAGE BUCKET POLICIES" section of supabase-setup.sql in the SQL editor.');
    }
    if (m.includes('jwt') || m.includes('401') || m.includes('token') || m.includes('expired')) {
      throw new Error('Session expired. Sign out and sign back in.');
    }
    if (m.includes('payload') || m.includes('large') || m.includes('413')) {
      throw new Error('Photo too large. Try a smaller image.');
    }
    if (m.includes('network') || m.includes('failed to fetch')) {
      throw new Error('Network error — check your internet and try again.');
    }
    throw new Error(error.message || 'Unknown storage error. Open DevTools Console for details.');
  }
  return path;
}

async function testPhotoUpload() {
  // Creates a 1x1 PNG and uploads it to diagnose bucket/policy issues
  try {
    showSyncStatus('syncing');
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { toast('Not signed in', 'error'); return; }
    const testBlob = await new Promise(resolve => {
      const c = document.createElement('canvas');
      c.width = 8; c.height = 8;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#6366f1'; ctx.fillRect(0, 0, 8, 8);
      c.toBlob(b => resolve(b), 'image/jpeg', 0.8);
    });
    const testPath = `diagnostic-${Date.now()}.jpg`;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(testPath, testBlob, { contentType: 'image/jpeg', upsert: true });
    if (error) {
      console.error('Test upload error:', error);
      toast('Storage test FAILED: ' + (error.message || 'unknown'), 'error');
      showSyncStatus('error');
      return;
    }
    // Clean up test file
    await sb.storage.from(PHOTO_BUCKET).remove([testPath]).catch(() => {});
    toast('Storage is working correctly ✓', 'success');
    showSyncStatus('synced');
  } catch (e) {
    console.error('Test upload exception:', e);
    toast('Storage test FAILED: ' + (e.message || 'unknown'), 'error');
    showSyncStatus('error');
  }
}

async function getCloudPhotoUrl(path) {
  if (!path) return null;
  const { data, error } = await sb.storage.from(PHOTO_BUCKET).createSignedUrl(path, 3600);
  if (error) { console.warn('Photo URL error:', error); return null; }
  return data?.signedUrl || null;
}

async function sweepOrphanPhotos() {
  const { data: files, error } = await sb.storage.from(PHOTO_BUCKET).list('', { limit: 1000 });
  if (error || !files) return;
  const activePaths = new Set(getTransactions().filter(t => t.photoPath).map(t => t.photoPath));
  const orphans = files.filter(f => !activePaths.has(f.name)).map(f => f.name);
  if (orphans.length > 0) {
    await sb.storage.from(PHOTO_BUCKET).remove(orphans);
    console.log(`Swept ${orphans.length} orphan photos`);
  }
  localStorage.setItem(KEYS.orphanSweep, Date.now().toString());
}

/* =================================================================
   ARCHIVE — weekly report generator (Excel + photos in a ZIP)
   ================================================================= */
function renderArchive() {
  const el = document.getElementById('archiveList');
  if (!el) return;
  const now = new Date();
  const weeks = [];
  for (let i = 0; i < 4; i++) {
    const end = new Date(now); end.setDate(end.getDate() - i * 7); end.setHours(23,59,59,999);
    const start = new Date(end); start.setDate(start.getDate() - 6); start.setHours(0,0,0,0);
    weeks.push({ start, end, label: `${start.toLocaleDateString('en-GB')} – ${end.toLocaleDateString('en-GB')}` });
  }
  el.innerHTML = weeks.map((w, idx) => `
    <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <div>
        <div style="font-weight:700; font-size:0.9rem;">Week ${idx === 0 ? '(current)' : idx === 1 ? '(last week)' : idx + ' weeks ago'}</div>
        <div style="font-size:0.75rem; color:var(--text-light);">${w.label}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="downloadWeeklyArchive('${w.start.toISOString()}','${w.end.toISOString()}')">Download ZIP</button>
    </div>
  `).join('');
}

async function downloadWeeklyArchive(fromIso, toIso) {
  toast('Building report... this may take a moment', 'warning');
  try {
    const { data: txns, error } = await sb.from('transactions').select('*')
      .gte('created_at', fromIso).lte('created_at', toIso)
      .order('created_at', { ascending: false });
    if (error) throw error;
    if (!txns || txns.length === 0) { toast('No transactions for that week', 'warning'); return; }

    const from = fromIso.slice(0,10), to = toIso.slice(0,10);
    const totalItems = txns.reduce((s,t) => s + t.items.reduce((a,i) => a + i.qty, 0), 0);

    // Excel
    const wb = XLSX.utils.book_new();
    const summary = [
      ['Weekly Inventory Report'],
      ['Period', `${from} to ${to}`],
      ['Generated', new Date().toLocaleString('en-GB')],
      [],
      ['Transactions', txns.length],
      ['Items issued', totalItems]
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Summary');

    const rows = [['Date','Time','Staff','Service User','Room','Item','Qty','Unit','Notes','Photo']];
    txns.forEach(t => {
      const dt = new Date(t.created_at);
      const d = dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      const tm = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      t.items.forEach(i => {
        rows.push([d, tm, t.staff_name || '', t.user_name, t.user_room || '',
                   i.name, i.qty, i.unit || 'pcs', t.notes || '',
                   t.photo_path ? `photos/${photoFilename(t)}` : '']);
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:8},{wch:16},{wch:20},{wch:8},{wch:35},{wch:8},{wch:8},{wch:25},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Transactions');
    const xlsxBuf = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });

    // ZIP
    const zip = new JSZip();
    zip.file(`Report_${from}_to_${to}.xlsx`, xlsxBuf);
    const photoFolder = zip.folder('photos');
    let photoCount = 0;
    for (const t of txns) {
      if (!t.photo_path) continue;
      try {
        const { data: blob, error: dlErr } = await sb.storage.from(PHOTO_BUCKET).download(t.photo_path);
        if (dlErr || !blob) continue;
        photoFolder.file(photoFilename(t), blob);
        photoCount++;
      } catch(e) { console.warn('photo fetch failed', t.photo_path, e); }
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Inventory_Week_${from}_to_${to}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast(`ZIP ready — ${txns.length} txns, ${photoCount} photos`, 'success');
  } catch(e) {
    console.error('Archive error:', e);
    toast('Report failed: ' + (e.message || e), 'error');
  }
}

function photoFilename(t) {
  const dt = new Date(t.created_at);
  const stamp = dt.toISOString().slice(0,19).replace(/[:T]/g, '-');
  const safe = s => (s || '').replace(/[^a-z0-9]+/gi, '_').slice(0, 30);
  return `${stamp}_room-${safe(t.user_room)}_${safe(t.user_name)}.jpg`;
}

/* =================================================================
   PWA — Service Worker
   ================================================================= */
if ('serviceWorker' in navigator) {
  // Auto-reload the page when a new Service Worker takes control.
  // Without this, users keep running the old JS until they manually refresh,
  // which means bug fixes deployed to main don't reach their device.
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshing) return;
    swRefreshing = true;
    console.log('[SW] New version activated — reloading page');
    window.location.reload();
  });
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      console.log('SW registered:', reg.scope);
      // Check for updates on every page load
      reg.update().catch(() => {});
    })
    .catch(err => console.log('SW failed:', err));
}
