let dashChart = null;

function renderDashboard() {
  const items = getItems();
  const txns = getTransactions();
  const todayStr = today();
  const todayTxns = txns.filter(t => t.date.slice(0, 10) === todayStr);
  const lowItems = items.filter(i => i.quantity > 0 && i.quantity <= (i.minStock || 5));
  const outItems = items.filter(i => i.quantity <= 0);

  // Stats
  document.getElementById('dashStats').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${items.length}</div><div class="stat-label">Products</div></div>
      <div class="stat-card"><div class="stat-value">${items.reduce((s, i) => s + i.quantity, 0)}</div><div class="stat-label">Items in Stock</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${lowItems.length > 0 ? 'var(--warning)' : 'var(--success)'};">${lowItems.length}</div><div class="stat-label">Low Stock</div></div>
      <div class="stat-card"><div class="stat-value">${todayTxns.length}</div><div class="stat-label">Today's Issues</div></div>
    </div>`;

  // Low stock alerts
  const alertEl = document.getElementById('dashAlerts');
  if (lowItems.length > 0 || outItems.length > 0) {
    alertEl.innerHTML = `
      <div class="alert-card" onclick="downloadLowStockReport()">
        <h4>&#9888; ${lowItems.length + outItems.length} Stock Alerts</h4>
        <p>${outItems.length} out of stock &middot; ${lowItems.length} low stock &mdash; Tap to download reorder report</p>
      </div>`;
  } else {
    alertEl.innerHTML = '';
  }

  // Chart — Stock by Category (pie)
  const catCounts = {};
  CATEGORIES.forEach(c => catCounts[c] = 0);
  items.forEach(i => { if (catCounts[i.category] !== undefined) catCounts[i.category] += i.quantity; });
  const usedCats = Object.entries(catCounts).filter(([,v]) => v > 0);

  // 14-colour palette — bright enough for small slices, harmonises with app's indigo theme
  const PIE_COLORS = [
    '#6366f1', '#06b6d4', '#a855f7', '#ec4899', '#f43f5e',
    '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#14b8a6',
    '#0ea5e9', '#3b82f6', '#8b5cf6', '#d946ef'
  ];

  if (dashChart) dashChart.destroy();
  const ctx = document.getElementById('dashChart').getContext('2d');
  dashChart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: usedCats.map(([k]) => k),
      datasets: [{
        data: usedCats.map(([,v]) => v),
        backgroundColor: usedCats.map((_, idx) => PIE_COLORS[idx % PIE_COLORS.length]),
        borderColor: '#ffffff',
        borderWidth: 2,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 11 },
            boxWidth: 12,
            padding: 8,
            usePointStyle: true
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : '0';
              return `${ctx.label}: ${ctx.parsed} (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function downloadLowStockReport() {
  const items = getItems();
  const reorderItems = items.filter(i => i.quantity <= (i.minStock || 5)).sort((a, b) => a.quantity - b.quantity);
  if (reorderItems.length === 0) { toast('No items to reorder', 'warning'); return; }

  const wb = XLSX.utils.book_new();

  // Reorder sheet
  const rows = [
    ['REORDER LIST — Generated ' + new Date().toLocaleDateString('en-GB')],
    ['Items below minimum stock level'],
    [],
    ['Item Name', 'Category', 'Current Qty', 'Min Stock', 'Max Stock', 'ORDER QTY', 'Unit']
  ];
  let total = 0;
  reorderItems.forEach(i => {
    const orderQty = (i.maxStock || 20) - i.quantity;
    total += orderQty;
    rows.push([i.name, i.category, i.quantity, i.minStock || 5, i.maxStock || 20, orderQty, i.unit || 'pcs']);
  });
  rows.push([]);
  rows.push(['TOTAL TO ORDER', '', '', '', '', total, '']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:35},{wch:15},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'Reorder List');

  // Full inventory sheet
  const invRows = [['Item Name', 'Category', 'Current Qty', 'Unit', 'Min Stock', 'Max Stock', 'Status']];
  items.forEach(i => {
    const s = stockStatus(i);
    invRows.push([i.name, i.category, i.quantity, i.unit || 'pcs', i.minStock || 5, i.maxStock || 20, s.label]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(invRows);
  ws2['!cols'] = [{wch:35},{wch:15},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Full Inventory');

  XLSX.writeFile(wb, `Reorder_Report_${today()}.xlsx`);
  toast('Reorder report downloaded!', 'success');
}

function initReports() {
  const settings = getSettings();
  document.getElementById('fridayToggle').checked = settings.fridayAutoReport || false;
  if (!document.getElementById('reportFrom').value) {
    const d = new Date(); d.setDate(d.getDate() - 7);
    document.getElementById('reportFrom').value = d.toISOString().slice(0, 10);
    document.getElementById('reportTo').value = today();
  }
  checkFridayReport();
}

function checkFridayReport() {
  const settings = getSettings();
  const banner = document.getElementById('fridayBanner');
  const now = new Date();
  const isFriday = now.getDay() === 5;

  if (settings.fridayAutoReport && isFriday) {
    const lastReport = load(KEYS.fridayReport);
    if (lastReport !== today()) {
      banner.innerHTML = `<div class="friday-banner">&#128197; It's Friday! Auto-generating weekly report...<button class="btn btn-sm btn-warning" onclick="autoFridayReport()" style="margin-left:auto;">Download Now</button></div>`;
      autoFridayReport();
    } else {
      banner.innerHTML = `<div class="friday-banner">&#9989; Friday report already generated today.</div>`;
    }
  } else if (settings.fridayAutoReport) {
    banner.innerHTML = `<div class="friday-banner">&#128197; Auto Friday Report enabled. Reports generate every Friday.</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function toggleFridayReport() {
  const settings = getSettings();
  settings.fridayAutoReport = document.getElementById('fridayToggle').checked;
  saveSettings(settings);
  checkFridayReport();
  toast(settings.fridayAutoReport ? 'Friday auto-report enabled' : 'Friday auto-report disabled');
}

function autoFridayReport() {
  const to = today();
  const d = new Date(); d.setDate(d.getDate() - 7);
  const from = d.toISOString().slice(0, 10);
  document.getElementById('reportFrom').value = from;
  document.getElementById('reportTo').value = to;
  generateReport();
  downloadExcelReport();
  save(KEYS.fridayReport, today());
  checkFridayReport();
}

function generateReport() {
  const from = document.getElementById('reportFrom').value;
  const to = document.getElementById('reportTo').value;
  if (!from || !to) { toast('Please select date range', 'warning'); return; }

  const txns = getTransactions().filter(t => {
    const d = t.date.slice(0, 10);
    return d >= from && d <= to;
  });

  const totalItems = txns.reduce((s, t) => s + t.items.reduce((a, i) => a + i.qty, 0), 0);

  document.getElementById('reportSummary').innerHTML = `
    <div class="stats-grid" style="margin-top:12px;">
      <div class="stat-card"><div class="stat-value">${txns.length}</div><div class="stat-label">Transactions</div></div>
      <div class="stat-card"><div class="stat-value">${totalItems}</div><div class="stat-label">Items Issued</div></div>
    </div>`;

  if (txns.length === 0) {
    document.getElementById('reportTable').innerHTML = '<div class="card"><div style="text-align:center; color:var(--text-light); padding:20px;">No transactions in this period.</div></div>';
    return;
  }

  // Build rows — one row per item issued
  const reportRows = [];
  txns.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
    t.items.forEach(i => {
      reportRows.push({ date: t.date, userName: t.userName, room: t.userRoom, staffName: t.staffName, itemName: i.name, qty: i.qty, unit: i.unit || 'pcs' });
    });
  });

  document.getElementById('reportTable').innerHTML = `<div class="card"><div class="table-wrapper"><table class="report-table">
    <thead><tr><th>Date</th><th>Time</th><th>Staff</th><th>User</th><th>Room</th><th>Item</th><th>Qty</th></tr></thead>
    <tbody>${reportRows.map(r => {
      const dt = new Date(r.date);
      return `<tr>
        <td>${dt.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})}</td>
        <td>${dt.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})}</td>
        <td>${r.staffName || '-'}</td>
        <td>${r.userName}</td>
        <td>${r.room || '-'}</td>
        <td>${r.itemName}</td>
        <td>${r.qty}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`;
}

function downloadExcelReport() {
  const from = document.getElementById('reportFrom').value;
  const to = document.getElementById('reportTo').value;
  if (!from || !to) { toast('Please select date range', 'warning'); return; }

  const txns = getTransactions().filter(t => {
    const d = t.date.slice(0, 10);
    return d >= from && d <= to;
  });
  const items = getItems();
  const totalItems = txns.reduce((s, t) => s + t.items.reduce((a, i) => a + i.qty, 0), 0);

  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryData = [
    ['Inventory Report'],
    ['Period', `${from} to ${to}`],
    ['Generated', new Date().toLocaleString()],
    [],
    ['Total Transactions', txns.length],
    ['Total Items Issued', totalItems],
    ['Total Items in Inventory', items.length],
    ['Total Stock Units', items.reduce((s, i) => s + i.quantity, 0)],
    ['Low Stock Items', items.filter(i => i.quantity > 0 && i.quantity <= (i.minStock || 5)).length],
    ['Out of Stock Items', items.filter(i => i.quantity <= 0).length],
    [],
    ['--- REORDER SUMMARY ---'],
    ['Items Needing Reorder', items.filter(i => i.quantity <= (i.minStock || 5)).length],
    ['Total Units to Order', items.filter(i => i.quantity <= (i.minStock || 5)).reduce((s, i) => s + ((i.maxStock || 20) - i.quantity), 0)],
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
  XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

  // Sheet 2: Transactions — one row per item issued
  const txnRows = [['Date', 'Time', 'Staff', 'Service User', 'Room', 'Product Code', 'Item Name', 'Quantity', 'Unit', 'Notes']];
  const allItems = getItems();
  txns.forEach(t => {
    const txnDate = new Date(t.date);
    const dateStr = txnDate.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = txnDate.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    t.items.forEach(i => {
      const invItem = allItems.find(x => x.id === i.itemId);
      txnRows.push([
        dateStr, timeStr, t.staffName || '', t.userName, t.userRoom || '',
        invItem?.productCode || '', i.name, i.qty, i.unit || 'pcs', t.notes || ''
      ]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(txnRows);
  ws2['!cols'] = [{wch:12},{wch:8},{wch:16},{wch:20},{wch:8},{wch:14},{wch:35},{wch:10},{wch:8},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Transactions');

  // Sheet 3: Current Inventory
  const invRows = [['Item Name', 'Category', 'Current Qty', 'Unit', 'Min Stock', 'Max Stock', 'Status']];
  items.forEach(i => {
    const s = stockStatus(i);
    invRows.push([i.name, i.category, i.quantity, i.unit || 'pcs', i.minStock || 5, i.maxStock || 20, s.label]);
  });
  const ws3 = XLSX.utils.aoa_to_sheet(invRows);
  ws3['!cols'] = [{wch:35},{wch:15},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Inventory');

  // Sheet 4: Reorder List
  const reorderRows = [
    ['REORDER LIST — Generated ' + new Date().toLocaleDateString('en-GB')],
    ['Items below minimum stock level — order up to Max Stock'],
    [],
    ['Item Name', 'Category', 'Current Qty', 'Min Stock', 'Max Stock', 'ORDER QTY', 'Unit']
  ];
  const reorderItems = items.filter(i => i.quantity <= (i.minStock || 5)).sort((a, b) => a.quantity - b.quantity);
  let totalToOrder = 0;
  reorderItems.forEach(i => {
    const orderQty = (i.maxStock || 20) - i.quantity;
    totalToOrder += orderQty;
    reorderRows.push([i.name, i.category, i.quantity, i.minStock || 5, i.maxStock || 20, orderQty, i.unit || 'pcs']);
  });
  reorderRows.push([]);
  reorderRows.push(['TOTAL TO ORDER', '', '', '', '', totalToOrder, '']);
  const ws4 = XLSX.utils.aoa_to_sheet(reorderRows);
  ws4['!cols'] = [{wch:35},{wch:15},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws4, 'Reorder List');

  XLSX.writeFile(wb, `Inventory_Report_${from}_to_${to}.xlsx`);
  toast('Excel report downloaded!', 'success');
}

function togglePwVisibility(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (!inp || !btn) return;
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  btn.innerHTML = showing
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`

}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { toast('Enter email and password', 'warning'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showLoginScreen(error.message || 'Sign in failed');
    return;
  }
  currentUser = data.user;
  document.getElementById('loginScreen')?.remove();
  document.querySelector('main').style.display = '';
  document.querySelector('.tab-bar').style.display = '';
  document.querySelector('.app-header').style.display = '';
  toast('Signed in', 'success');
  await afterAuthReady();
}

async function doLogout() {
  closeUserMenu();
  showConfirm('Sign out', 'You will need to sign in again to use the app.', async () => {
    try { unsubscribeRealtime(); } catch(e) {}
    try { stopPendingSubmissionsPoller(); } catch(e) {}
    await sb.auth.signOut();
    // Clear local cache so next user doesn't see old data
    localStorage.removeItem(KEYS.items);
    localStorage.removeItem(KEYS.transactions);
    currentUser = null;
    location.reload();
  });
}

/* ----- USER MENU (header dropdown) ----- */

  const menu = document.getElementById('userMenu');
  const btn = document.getElementById('userMenuBtn');
  if (!menu) return;
  const showing = menu.style.display !== 'none';
  if (showing) { closeUserMenu(); return; }
  menu.style.display = 'block';
  btn?.setAttribute('aria-expanded', 'true');
  const emailEl = document.getElementById('userMenuEmail');
  if (emailEl) emailEl.textContent = (currentUser && currentUser.email) || '';
  // Show the cache version + role so we can diagnose stale-cache / wrong-role issues
  const verEl = document.getElementById('userMenuVersion');
  if (verEl) {
    const role = isASM() ? 'ASM' : 'Welfare';
    verEl.textContent = `${role} · app ${window.APP_VERSION || 'dev'}`;
  }
  // Click-away to close (capture so it fires before inner click handlers)
  setTimeout(() => document.addEventListener('click', userMenuClickAway, { capture: true }), 0);
}
function closeUserMenu() {
  const menu = document.getElementById('userMenu');
  const btn = document.getElementById('userMenuBtn');
  if (menu) menu.style.display = 'none';
  btn?.setAttribute('aria-expanded', 'false');
  document.removeEventListener('click', userMenuClickAway, { capture: true });
}
function userMenuClickAway(e) {
  const menu = document.getElementById('userMenu');
  const btn = document.getElementById('userMenuBtn');
  if (!menu) { document.removeEventListener('click', userMenuClickAway, { capture: true }); return; }
  if (menu.contains(e.target) || (btn && btn.contains(e.target))) return;
  closeUserMenu();
}

async function savePasswordChange() {
  const isRecovery = isRecoveryMode;
  const curEl = document.getElementById('cpwCurrent');
  const cur = curEl ? (curEl.value || '') : '';
  const np = document.getElementById('cpwNew')?.value || '';
  const cp = document.getElementById('cpwConfirm')?.value || '';
  const errEl = document.getElementById('cpwErr');
  const showErr = msg => { if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } };
  const hideErr = () => { if (errEl) { errEl.style.display = 'none'; } };
  hideErr();

  // Self-service change requires current password
  if (!isRecovery && !cur) return showErr('Enter your current password.');
  if (np.length < 8) return showErr('New password must be at least 8 characters.');
  if (np !== cp) return showErr('New passwords do not match.');
  if (!isRecovery && np === cur) return showErr('New password must be different from the current one.');

  const btn = document.getElementById('cpwSaveBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...'; }
  const resetBtn = () => { if (btn) { btn.disabled = false; btn.textContent = 'Save password'; } };

  // Step 1 (self-service only): verify the current password by re-signing in.
  // signInWithPassword refreshes the session on success, so the subsequent
  // updateUser call runs against a known-good session.
  if (!isRecovery) {
    const email = currentUser?.email;
    if (!email) { showErr('Could not verify your account — please sign out and back in.'); resetBtn(); return; }
    const { error: signinErr } = await sb.auth.signInWithPassword({ email, password: cur });
    if (signinErr) {
      const m = (signinErr.message || '').toLowerCase();
      if (m.includes('invalid') || m.includes('credentials') || m.includes('password')) {
        showErr('Current password is incorrect.');
      } else {
        showErr(signinErr.message || 'Could not verify current password.');
      }
      resetBtn();
      return;
    }
  }

  // Step 2: update password
  const { error } = await sb.auth.updateUser({ password: np });
  if (error) {
    showErr(error.message || 'Could not update password.');
    resetBtn();
    return;
  }

  isRecoveryMode = false;
  closeModal();
  toast('Password updated', 'success');
  if (isRecovery) {
    // Finish the recovery flow: restore the app UI and pull data
    const mainEl = document.querySelector('main');
    const tabBarEl = document.querySelector('.tab-bar');
    const headerEl = document.querySelector('.app-header');
    if (mainEl) mainEl.style.display = '';
    if (tabBarEl) tabBarEl.style.display = '';
    if (headerEl) headerEl.style.display = '';
    try { await afterAuthReady(); } catch(e) { console.warn('afterAuthReady after recovery failed:', e); }
  }
}

/* =================================================================
   CLOUD SYNC — Supabase as source of truth, localStorage as cache
   ================================================================= */
async function pullFromSupabase() {
  const since = new Date(Date.now() - RETENTION_DAYS * 86400000).toISOString();
  const [itemsRes, txnRes] = await Promise.all([
    sb.from('items').select('*').order('name'),
    sb.from('transactions').select('*').gte('created_at', since).order('created_at', { ascending: false })
  ]);
  if (itemsRes.error) throw itemsRes.error;
  if (txnRes.error) throw txnRes.error;
  const items = (itemsRes.data || []).map(r => ({
    id: r.id, name: r.name, category: r.category, quantity: r.quantity,
    unit: r.unit, minStock: r.min_stock, maxStock: r.max_stock,
    productCode: r.product_code, dateAdded: r.created_at
  }));
  const txns = (txnRes.data || []).map(r => ({
    id: r.id, userName: r.user_name, userRoom: r.user_room, staffName: r.staff_name,
    items: r.items, notes: r.notes, photoPath: r.photo_path, date: r.created_at
  }));
  localStorage.setItem(KEYS.items, JSON.stringify(items));
  localStorage.setItem(KEYS.transactions, JSON.stringify(txns));
}

function rowFromItem(i) {
  return {
    id: i.id, name: i.name, category: i.category, quantity: i.quantity,
    unit: i.unit, min_stock: i.minStock, max_stock: i.maxStock,
    product_code: i.productCode || null
  };
}

async function pushItem(item) {
  showSyncStatus('syncing');
  const { error } = await sb.from('items').upsert(rowFromItem(item));
  if (error) { showSyncStatus('error'); toast('Sync failed: ' + error.message, 'error'); return false; }
  showSyncStatus('synced'); return true;
}

async function pushItemDelete(id) {
  showSyncStatus('syncing');
  const { error } = await sb.from('items').delete().eq('id', id);
  if (error) { showSyncStatus('error'); return false; }
  showSyncStatus('synced'); return true;
}

async function pushTransaction(txn) {
  showSyncStatus('syncing');
  const { error } = await sb.from('transactions').insert({
    id: txn.id,
    user_name: txn.userName,
    user_room: txn.userRoom || null,
    staff_name: txn.staffName || null,
    items: txn.items,
    notes: txn.notes || null,
    photo_path: txn.photoPath || null,
    created_at: txn.date
  });
  if (error) { showSyncStatus('error'); toast('Transaction sync failed: ' + error.message, 'error'); return false; }
  showSyncStatus('synced'); return true;
}

/* =================================================================
   STOCK COUNT SUBMISSIONS — cloud-backed approval flow
   Welfare submits counts → ASM reviews and applies
   ================================================================= */

// Fetch pending submissions (status='pending'), newest first
async function pullStockCountSubmissions() {
  const { data, error } = await sb
    .from('stock_counts')
    .select('*')
    .eq('status', 'pending')
    .order('submitted_at', { ascending: false });
  if (error) { console.warn('Pull pending stock counts failed:', error); return []; }
  return data || [];
}

// Fetch a single submission by id
async function getStockCountSubmission(id) {
  const { data, error } = await sb.from('stock_counts').select('*').eq('id', id).single();
  if (error) { console.warn('Get submission failed:', error); return null; }
  return data;
}

// Button handler: disables the Send button, calls submitCountToASM, closes modal on success

// Welfare (or ASM) sends current countState + summary to cloud as pending
async function submitCountToASM() {
  const data = computeVariance();
  if (!data.items.length) {
    toast('No counts entered — type a number next to at least one item first', 'warning');
    return false;
  }
  // Auth guard — an expired session would silently hit RLS and the row would
  // never land. Check upfront and tell the user to sign back in if needed.
  try {
    const { data: sess } = await sb.auth.getSession();
    if (!sess || !sess.session || !sess.session.user) {
      console.error('[stock_counts] No active session — blocking submit');
      toast('Your session has expired — please sign in again', 'error');
      return false;
    }
    console.log('[stock_counts] Submit auth OK — user:', sess.session.user.email);
  } catch (e) {
    console.warn('[stock_counts] auth.getSession failed:', e);
  }
  const payload = {
    submitted_by: (currentUser && currentUser.email) || 'unknown',
    counts: data.items.map(i => ({
      id: i.id, name: i.name, category: i.category, unit: i.unit,
      system: i.system, actual: i.actual, variance: i.variance, pct: i.pct
    })),
    summary: {
      accuracyPct: data.accuracyPct,
      netPct: data.netPct,
      absVarPct: data.absVarPct,
      okCount: data.okCount,
      surplusCount: data.surplusCount,
      shortCount: data.shortCount,
      sumSystem: data.sumSystem,
      sumActual: data.sumActual
    },
    status: 'pending'
  };
  showSyncStatus('syncing');
  console.log('[stock_counts] Submitting count with', payload.counts.length, 'items as', payload.submitted_by);
  // .select('*').single() returns the inserted row so we can VERIFY it landed.
  // Without this, a silently-blocked INSERT (RLS, missing table, etc.) looks
  // successful and the row never appears in ASM's queue.
  const { data: inserted, error } = await sb
    .from('stock_counts')
    .insert(payload)
    .select('*')
    .single();
  if (error) {
    console.error('submitCountToASM failed:', error);
    showSyncStatus('error');
    toast('Could not send to ASM: ' + (error.message || 'unknown error'), 'error');
    return false;
  }
  if (!inserted || !inserted.id) {
    console.error('submitCountToASM: INSERT returned no row — RLS may be blocking');
    showSyncStatus('error');
    toast('Submit blocked by database — re-run supabase-setup.sql in the SQL Editor', 'error');
    return false;
  }
  console.log('[stock_counts] Submitted OK — row id:', inserted.id, 'status:', inserted.status);
  showSyncStatus('synced');
  toast(`Report sent to ASM for approval (id ${inserted.id.slice(0, 8)}…)`, 'success');
  // Clear local counts since they are now safely stored server-side
  countState = {};
  renderCount();
  return true;
}

// Mark a submission as applied/dismissed and VERIFY the DB row actually moved.
// Returns true on success, false if the update truly didn't land.
// If .update().select() returns 0 rows with no error (can happen with some RLS
// edge cases), we do a follow-up read to confirm whether the status actually
// changed — if yes, treat as success rather than leaving the queue stuck.
async function markSubmissionStatus(id, newStatus, extraFields) {
  const payload = Object.assign({
    status: newStatus,
    applied_by: (currentUser && currentUser.email) || 'unknown',
    applied_at: new Date().toISOString()
  }, extraFields || {});
  console.log('[stock_counts] Marking', id, '→', newStatus, 'as', payload.applied_by);
  const { data, error } = await sb
    .from('stock_counts')
    .update(payload)
    .eq('id', id)
    .select('*');
  if (error) {
    console.error(`[stock_counts] Mark ${newStatus} failed:`, error);
    toast(`Could not mark ${newStatus}: ` + (error.message || 'database error'), 'error');
    return false;
  }
  if (data && data.length) {
    console.log(`[stock_counts] Marked ${newStatus} — DB returned`, data[0]);
    return true;
  }
  // Zero rows returned — could be RLS SELECT quirk, could be the update genuinely
  // didn't happen. Verify by reading the row back.
  console.warn(`[stock_counts] Mark ${newStatus} returned no rows — verifying via read-back`);
  const { data: check, error: checkErr } = await sb
    .from('stock_counts')
    .select('id,status')
    .eq('id', id)
    .maybeSingle();
  if (checkErr) {
    console.error(`[stock_counts] Verification read failed:`, checkErr);
    toast(`Could not verify ${newStatus}: ` + (checkErr.message || 'database error'), 'error');
    return false;
  }
  if (!check) {
    console.error(`[stock_counts] Submission ${id} no longer exists`);
    toast(`Submission not found — it may have been removed`, 'warning');
    return true; // row gone means it's out of the queue — treat as success
  }
  if (check.status === newStatus) {
    console.log(`[stock_counts] Verified ${newStatus} in DB despite empty select() — treating as success`);
    return true;
  }
  console.error(`[stock_counts] Update did not land — DB still shows status=${check.status}`);
  toast(`Database blocked the update (status still "${check.status}"). Re-run supabase-setup.sql in the SQL Editor.`, 'error');
  return false;
}

// After a successful apply/dismiss, close the review modal and either re-open
// the queue (if more pending) or toast "All clear" so the user SEES progress.
async function finishReviewAndContinue(successToast, successType) {
  closeModal();
  if (typeof renderInventory === 'function') { try { renderInventory(); } catch(_) {} }
  await refreshPendingSubmissionsBanner();
  const remaining = await pullStockCountSubmissions();
  toast(successToast, successType || 'success');
  if (remaining.length) {
    // Let user see the toast for a moment before re-opening the list
    setTimeout(() => { try { openPendingSubmissions(); } catch(_) {} }, 350);
  } else {
    setTimeout(() => { toast('All submissions processed', 'success'); }, 450);
  }
}

// ASM reviews a submission and applies it — updates items + marks applied
async function applyStockCountSubmission(id) {
  console.log('[stock_counts] applyStockCountSubmission called for', id);
  if (!requireASM('Only ASM can apply stock variance')) return;
  try {
    const sub = await getStockCountSubmission(id);
    if (!sub) { toast('Submission not found', 'error'); return; }
    console.log('[stock_counts] Loaded submission:', { id: sub.id, status: sub.status, submitted_by: sub.submitted_by, count_items: (sub.counts || []).length });
    if (sub.status !== 'pending') {
      // Already processed — just clean up the banner and re-open the list
      toast('This submission has already been processed', 'warning');
      await refreshPendingSubmissionsBanner();
      const remaining = await pullStockCountSubmissions();
      closeModal();
      if (remaining.length) setTimeout(() => openPendingSubmissions(), 250);
      return;
    }
    const counts = sub.counts || [];
    const allItems = getItems();
    const affected = [];
    counts.forEach(c => {
      const idx = allItems.findIndex(x => x.id === c.id);
      if (idx < 0) {
        console.warn('[stock_counts] Item not found locally — skipped:', c.id, c.name);
        return;
      }
      // Coerce to Number so a string "5" still equals numeric 5 (prevents false
      // differences and false matches when counts come from form inputs)
      const current = Number(allItems[idx].quantity) || 0;
      const target = Number(c.actual) || 0;
      if (current !== target) {
        affected.push({ id: c.id, name: allItems[idx].name, from: current, to: target });
        allItems[idx].quantity = target;
      }
    });
    console.log(`[stock_counts] Apply: ${affected.length} of ${counts.length} items will change`, affected);

    if (!affected.length) {
      // Nothing to change but still mark as applied so it leaves the queue
      const ok = await markSubmissionStatus(id, 'applied', { note: 'No changes — counts already matched stock' });
      if (!ok) return; // error already toasted; keep modal open so ASM can retry
      await finishReviewAndContinue('Counts already match stock — marked applied');
      return;
    }

    // Push each changed item to cloud (items table updates trigger realtime on all devices)
    const pushPromises = affected.map(a => {
      const full = allItems.find(x => x.id === a.id);
      return Promise.resolve(pushItem(full)).catch(e => ({ _syncError: e, name: a.name }));
    });
    saveItems(allItems);
    const results = await Promise.all(pushPromises);
    const failed = results.filter(r => r && r._syncError);
    console.log(`[stock_counts] Apply: cloud pushes complete, ${failed.length} failed`);

    // Mark submission applied — VERIFIED via .select() so we know it actually landed
    const marked = await markSubmissionStatus(id, 'applied');
    if (!marked) {
      // Items were updated locally + cloud, but status didn't flip. Warn loudly.
      toast('Stock updated but submission could not be marked applied — it will still show until cleared', 'warning');
      return;
    }

    if (failed.length) {
      toast(`${failed.length} item(s) failed cloud sync — they will retry`, 'warning');
    }
    await finishReviewAndContinue(`Applied ${affected.length} item${affected.length !== 1 ? 's' : ''}`);
  } catch (err) {
    console.error('[stock_counts] applyStockCountSubmission failed:', err);
    toast('Could not apply: ' + (err && err.message ? err.message : 'unknown error'), 'error');
  }
}

async function dismissStockCountSubmission(id) {
  console.log('[stock_counts] dismissStockCountSubmission called for', id);
  if (!requireASM('Only ASM can dismiss a submission')) return;
  // Optimistic UI: fade the card out of the list immediately so the click
  // feels instant. No confirm dialog — dismiss is not destructive (data stays
  // in DB, just marked dismissed and can be undone from Debug: all submissions).
  fadeOutSubmissionCard(id);
  toast('Dismissing…', 'info', 1200);
  console.log('[stock_counts] Dismiss triggered, calling markSubmissionStatus');
  const ok = await markSubmissionStatus(id, 'dismissed');
  if (!ok) {
    // Error toast already shown — re-render list so user can try again
    if (typeof openPendingSubmissions === 'function') {
      try { await openPendingSubmissions(); } catch(_) {}
    }
    return;
  }
  await finishReviewAndContinue('Submission dismissed');
}

// Optimistic UI helper — fades the matching card out of the list modal
// so a click on Dismiss/Apply feels instant. If the DB call later fails,
// the list is re-rendered with all pending items still visible.
function fadeOutSubmissionCard(id) {
  try {
    // Find the onclick-bearing button with this id and walk up to its card
    const btn = document.querySelector(`button[onclick*="${id}"]`);
    const card = btn && btn.closest('.submission-card');
    if (!card) return;
    card.style.transition = 'opacity 0.25s ease, transform 0.25s ease, max-height 0.3s ease, margin 0.3s ease, padding 0.3s ease';
    card.style.maxHeight = card.offsetHeight + 'px';
    // Double RAF so the browser picks up the maxHeight baseline before we shrink
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.style.opacity = '0.3';
      card.style.transform = 'translateX(20px)';
      card.style.pointerEvents = 'none';
    }));
  } catch(_) {}
}

// Opens the list of pending submissions (ASM only)
async function openPendingSubmissions() {
  if (!requireASM('Only ASM can review pending counts')) return;
  const list = await pullStockCountSubmissions();
  if (!list.length) {
    toast('No pending submissions', 'success');
    refreshPendingSubmissionsBanner();
    return;
  }
  const cards = list.map(s => {
    const when = new Date(s.submitted_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
    const counts = s.counts || [];
    const summary = s.summary || {};
    const itemCount = counts.length;
    const acc = typeof summary.accuracyPct === 'number' ? summary.accuracyPct.toFixed(1) : '—';
    const net = typeof summary.netPct === 'number' ? fmtPct(summary.netPct) : '—';
    return `
      <div class="submission-card">
        <div class="head">
          <div>
            <div class="who">${esc(s.submitted_by || 'unknown')}</div>
            <div class="when">${when}</div>
          </div>
        </div>
        <div class="stats">
          <span><b>${itemCount}</b> item${itemCount !== 1 ? 's' : ''}</span>
          <span>Accuracy <b>${acc}%</b></span>
          <span>Net <b>${net}</b></span>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="reviewSubmission('${s.id}')">Review &amp; Apply</button>
          <button class="btn btn-outline" onclick="dismissStockCountSubmission('${s.id}')">Dismiss</button>
        </div>
      </div>`;
  }).join('');
  openModal(`
    <div class="modal-header">
      <h3>Pending Stock Counts</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <p style="font-size:0.82rem; color:var(--text-light); margin-bottom:12px;">
      ${list.length} submission${list.length !== 1 ? 's' : ''} waiting for approval. Review each one and apply or dismiss.
    </p>
    ${cards}
  `);
}

// Opens a full variance report for a specific submission with Apply / Dismiss buttons
async function reviewSubmission(id) {
  console.log('[stock_counts] reviewSubmission called for', id);
  toast('Opening review…', 'info', 1200);
  // Instant loading state so the user SEES their click registered — otherwise
  // an async fetch delay can look like nothing happened and they click again.
  openModal(`
    <div class="modal-header">
      <h3>Loading submission…</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div style="text-align:center; padding:40px 20px;">
      <span class="spinner"></span>
      <div style="margin-top:12px; color:var(--text-light); font-size:0.9rem;">Fetching count details…</div>
    </div>
  `);
  let sub;
  try {
    sub = await getStockCountSubmission(id);
  } catch (err) {
    console.error('[stock_counts] reviewSubmission fetch failed:', err);
    toast('Could not load submission: ' + (err && err.message ? err.message : 'network error'), 'error');
    closeModal();
    return;
  }
  if (!sub) {
    toast('Could not load submission — it may have been applied or removed', 'error');
    closeModal();
    // Bounce back to the list so the user isn't left on a blank screen
    setTimeout(() => { try { openPendingSubmissions(); } catch(_) {} }, 250);
    return;
  }
  if (sub.status !== 'pending') {
    toast(`This submission was already ${sub.status}`, 'warning');
    closeModal();
    await refreshPendingSubmissionsBanner();
    setTimeout(() => { try { openPendingSubmissions(); } catch(_) {} }, 250);
    return;
  }
  const counts = sub.counts || [];
  const summary = sub.summary || {};
  const submitter = esc(sub.submitted_by || 'unknown');
  const when = new Date(sub.submitted_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });

  const itemRow = (i) => {
    const v = Number(i.variance) || 0;
    const cls = v === 0 ? '' : (v > 0 ? 'pos' : 'neg');
    const pct = typeof i.pct === 'number' ? i.pct : 0;
    return `<div class="var-item-row">
      <span class="nm">${esc(i.name)}</span>
      <span class="delta ${cls}">${fmtDelta(v)}</span>
      <span class="pct ${cls}">${fmtPct(pct)}</span>
    </div>`;
  };

  // Re-compute simple shorts/surpluses from counts
  const shorts = counts.filter(i => Number(i.variance) < 0).sort((a, b) => (a.pct || 0) - (b.pct || 0)).slice(0, 5);
  const surpluses = counts.filter(i => Number(i.variance) > 0).sort((a, b) => (b.pct || 0) - (a.pct || 0)).slice(0, 5);

  const html = `
    <div class="modal-header">
      <h3>Review Submission</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="var-report-date">
      From <b style="color:var(--text);">${submitter}</b> &middot; ${when} &middot; ${counts.length} item${counts.length !== 1 ? 's' : ''}
    </div>

    <div class="var-kpi-grid">
      <div class="var-kpi ${(summary.accuracyPct || 0) >= 95 ? 'good' : ''}">
        <div class="var-kpi-val">${(summary.accuracyPct || 0).toFixed(1)}%</div>
        <div class="var-kpi-lbl">Accuracy</div>
      </div>
      <div class="var-kpi ${(summary.netPct || 0) > 0 ? 'pos' : (summary.netPct || 0) < 0 ? 'neg' : 'good'}">
        <div class="var-kpi-val">${fmtPct(summary.netPct || 0)}</div>
        <div class="var-kpi-lbl">Net Variance</div>
      </div>
      <div class="var-kpi">
        <div class="var-kpi-val">${(summary.absVarPct || 0).toFixed(1)}%</div>
        <div class="var-kpi-lbl">Total Movement</div>
      </div>
    </div>

    <div class="var-status-row ok">
      <span>Matches system (OK)</span>
      <span><b>${summary.okCount || 0}</b></span>
    </div>
    <div class="var-status-row surplus">
      <span>Surplus (counted &gt; system)</span>
      <span><b>${summary.surplusCount || 0}</b></span>
    </div>
    <div class="var-status-row short">
      <span>Short (counted &lt; system)</span>
      <span><b>${summary.shortCount || 0}</b></span>
    </div>

    ${shorts.length ? `<div class="var-section-title">Top Shortages</div>${shorts.map(itemRow).join('')}` : ''}
    ${surpluses.length ? `<div class="var-section-title">Top Surpluses</div>${surpluses.map(itemRow).join('')}` : ''}

    <details style="margin-top:14px;">
      <summary style="cursor:pointer; font-size:0.82rem; font-weight:600; color:var(--primary); padding:6px 0;">
        Show all ${counts.length} counted item${counts.length !== 1 ? 's' : ''}
      </summary>
      <div style="margin-top:8px;">
        ${counts.slice().sort((a, b) => Math.abs((b.pct || 0)) - Math.abs((a.pct || 0))).map(itemRow).join('')}
      </div>
    </details>

    <div style="display:flex; gap:8px; margin-top:18px;" id="reviewActionRow">
      <button class="btn btn-outline" style="flex:1;" onclick="openPendingSubmissions()">Back</button>
      <button class="btn btn-danger" id="reviewDismissBtn" onclick="handleReviewDismiss('${sub.id}')">Dismiss</button>
      <button class="btn btn-warning" style="flex:1;" id="reviewApplyBtn" onclick="handleReviewApply('${sub.id}')">Apply to Stock</button>
    </div>
  `;
  openModal(html);
}

// Wrapper for Apply click: disables buttons + shows spinner so the click
// visibly registers, then runs the real apply. Errors restore the buttons.
async function handleReviewApply(id) {
  const applyBtn = document.getElementById('reviewApplyBtn');
  const dismissBtn = document.getElementById('reviewDismissBtn');
  if (applyBtn) { applyBtn.disabled = true; applyBtn.innerHTML = '<span class="spinner"></span> Applying…'; }
  if (dismissBtn) dismissBtn.disabled = true;
  try {
    await applyStockCountSubmission(id);
  } finally {
    // If the modal is still open (apply failed mid-flight), restore buttons
    const stillThere = document.getElementById('reviewApplyBtn');
    if (stillThere) {
      stillThere.disabled = false;
      stillThere.innerHTML = 'Apply to Stock';
      const d = document.getElementById('reviewDismissBtn');
      if (d) d.disabled = false;
    }
  }
}

// Wrapper for Dismiss click (same pattern as Apply)
async function handleReviewDismiss(id) {
  const applyBtn = document.getElementById('reviewApplyBtn');
  const dismissBtn = document.getElementById('reviewDismissBtn');
  if (dismissBtn) { dismissBtn.disabled = true; dismissBtn.innerHTML = '<span class="spinner"></span> Dismissing…'; }
  if (applyBtn) applyBtn.disabled = true;
  try {
    await dismissStockCountSubmission(id);
  } finally {
    const stillThere = document.getElementById('reviewDismissBtn');
    if (stillThere) {
      stillThere.disabled = false;
      stillThere.innerHTML = 'Dismiss';
      const a = document.getElementById('reviewApplyBtn');
      if (a) a.disabled = false;
    }
  }
}

// Updates the pending banner on the Count tab AND the red-dot badge on the
// Stock Count nav button (visible from any tab). ASM only.
// Also updates the persistent cloud-state row so ASM can always see what's
// in the stock_counts table — kills the "nothing showing up" confusion.
async function refreshPendingSubmissionsBanner() {
  const el = document.getElementById('pendingSubmissionsBanner');
  const stateRow = document.getElementById('cloudStateRow');
  const badge = document.getElementById('countTabBadge');
  const setBadge = (n) => {
    if (!badge) return;
    if (n > 0) {
      badge.textContent = n > 9 ? '9+' : String(n);
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
      badge.textContent = '';
    }
  };
  if (!isASM()) {
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
    if (stateRow) { stateRow.style.display = 'none'; stateRow.innerHTML = ''; }
    setBadge(0);
    return;
  }
  // Full cloud-state read — one query, tells us everything
  const sinceIso = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data: all, error } = await sb
    .from('stock_counts')
    .select('id,status,submitted_by,submitted_at,applied_by,applied_at')
    .gte('submitted_at', sinceIso)
    .order('submitted_at', { ascending: false });
  const list = (all || []).filter(r => r.status === 'pending');
  const applied = (all || []).filter(r => r.status === 'applied').length;
  const dismissed = (all || []).filter(r => r.status === 'dismissed').length;
  setBadge(list.length);
  // Persistent cloud-state row — always visible to ASM on Count tab,
  // even when there are zero pending, so it's obvious the pipeline is live.
  if (stateRow) {
    if (error) {
      stateRow.style.display = '';
      stateRow.innerHTML = `
        <div style="background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 12px; font-size:0.82rem; color:#b91c1c; display:flex; gap:10px; align-items:center;">
          <span style="font-size:1rem;">!</span>
          <span><b>Cloud read failed</b> — ${esc(error.message || 'unknown error')}. The stock_counts table may not exist yet. Re-run supabase-setup.sql.</span>
        </div>`;
    } else {
      const updated = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const pendingColor = list.length > 0 ? '#f59e0b' : '#10b981';
      stateRow.style.display = '';
      stateRow.innerHTML = `
        <div onclick="asmShowAllSubmissions()" style="cursor:pointer; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; gap:8px;">
          <div style="display:flex; gap:14px; flex-wrap:wrap; font-size:0.82rem;">
            <span><span style="display:inline-block; width:8px; height:8px; background:${pendingColor}; border-radius:50%; margin-right:5px;"></span><b>${list.length}</b> pending</span>
            <span style="color:var(--text-light);"><b style="color:var(--text);">${applied}</b> applied</span>
            <span style="color:var(--text-light);"><b style="color:var(--text);">${dismissed}</b> dismissed</span>
          </div>
          <div style="font-size:0.7rem; color:var(--text-light);">last 24h · ${updated}</div>
        </div>`;
    }
  }
  if (!list.length) {
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
    return;
  }
  if (!el) return;
  el.style.display = '';
  const n = list.length;
  const latest = list[0];
  const fromWho = esc(latest.submitted_by || 'staff');
  el.innerHTML = `
    <div class="pending-banner" onclick="openPendingSubmissions()">
      <div class="pending-banner-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div class="pending-banner-text">
        <div class="pending-banner-title">${n} count submission${n !== 1 ? 's' : ''} awaiting approval</div>
        <div class="pending-banner-sub">Latest from ${fromWho} — tap to review</div>
      </div>
      <div class="pending-banner-arrow">&rsaquo;</div>
    </div>
  `;
}

// Polling fallback: if realtime isn't working (e.g. stock_counts not in the
// supabase_realtime publication), this still pulls pending counts every 45s.
let pendingSubmissionsPoller = null;
function startPendingSubmissionsPoller() {
  stopPendingSubmissionsPoller();
  // 15s for ASM (needs fast visibility of new submissions), 45s for Welfare.
  const interval = isASM() ? 15000 : 45000;
  pendingSubmissionsPoller = setInterval(() => {
    if (document.hidden) return; // save battery when tab is backgrounded
    refreshPendingSubmissionsBanner().catch(e => console.warn('Poll failed:', e));
    refreshPendingDeliveriesBanner().catch(e => console.warn('Delivery poll failed:', e));
  }, interval);
}
function stopPendingSubmissionsPoller() {
  if (pendingSubmissionsPoller) { clearInterval(pendingSubmissionsPoller); pendingSubmissionsPoller = null; }
}
// Refresh whenever the user returns to the tab (phone unlock, app switcher, etc.)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && currentUser) {
    refreshPendingSubmissionsBanner().catch(e => console.warn('Focus refresh failed:', e));
    refreshPendingDeliveriesBanner().catch(e => console.warn('Delivery focus refresh failed:', e));
  }
});

// ASM-only: force a manual pull of pending submissions from the user menu.
// Useful when realtime hasn't delivered an event (publication not enabled, etc.)
async function asmCheckForPending() {
  closeUserMenu();
  if (!requireASM('Only ASM can review pending counts')) return;
  try {
    await refreshPendingSubmissionsBanner();
    const list = await pullStockCountSubmissions();
    if (!list.length) {
      toast('No pending stock counts — all clear', 'success');
      return;
    }
    toast(`${list.length} pending — opening queue`, 'success');
    openPendingSubmissions();
  } catch (err) {
    console.error('asmCheckForPending failed:', err);
    toast('Could not check: ' + (err && err.message ? err.message : 'unknown error'), 'error');
  }
}

// ASM debug view: shows EVERY stock_counts row regardless of status.

// list is also empty, the INSERT is being blocked; if rows appear with

  closeUserMenu();
  if (!requireASM('ASM only')) return;
  const { data, error } = await sb
    .from('stock_counts')
    .select('id,submitted_by,submitted_at,status,applied_by,applied_at,counts')
    .order('submitted_at', { ascending: false })
    .limit(50);
  if (error) {
    console.error('asmShowAllSubmissions failed:', error);
    toast('Debug read failed: ' + (error.message || 'database error'), 'error');
    return;

  const rows = data || [];
  console.log('[debug] All stock_counts rows:', rows);
  if (!rows.length) {
    openModal(`
      <div class="modal-header">
        <h3>All Submissions (debug)</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <p style="font-size:0.9rem; color:var(--text-light); padding:20px 0;">
        <b>Zero rows in the stock_counts table.</b><br><br>
        If Welfare has tried to submit, their INSERT is being blocked silently.
        Most likely causes:<br>

    const appliedInfo = r.status !== 'pending' && r.applied_by
      ? `<div style="font-size:0.72rem; color:var(--text-light); margin-top:4px;">by ${esc(r.applied_by)} ${r.applied_at ? '· ' + new Date(r.applied_at).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' }) : ''}</div>`
      : '';
    return `
      <div style="padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; font-size:0.88rem;">${esc(r.submitted_by || 'unknown')}</div>
            <div style="font-size:0.72rem; color:var(--text-light);">${when} · ${count} item${count !== 1 ? 's' : ''}</div>

      </div>`;
  }).join('');
  const pending = rows.filter(r => r.status === 'pending').length;

  const dismissed = rows.filter(r => r.status === 'dismissed').length;

/* =================================================================
   DELIVERIES — Welfare records new stock arrivals, ASM approves,
   approved qty is ADDED to existing stock (not replaced).
   Mirrors the stock_counts approval flow but with additive semantics.
   ================================================================= */

// In-memory draft while the Record Delivery modal is open:
// { [itemId]: qty }
let deliveryDraft = {};

function openRecordDeliveryModal() {
  deliveryDraft = {};
  renderRecordDeliveryModal();
}

function renderRecordDeliveryModal() {
  const items = getItems().slice().sort((a, b) =>
    (a.category || '').localeCompare(b.category || '') ||
    (a.name || '').localeCompare(b.name || '')
  );
  const searchRaw = (document.getElementById('deliverySearchInput') && document.getElementById('deliverySearchInput').value) || '';
  const search = searchRaw.trim().toLowerCase();
  const filtered = search
    ? items.filter(i =>
        (i.name || '').toLowerCase().includes(search) ||
        (i.category || '').toLowerCase().includes(search) ||
        (i.productCode || '').toLowerCase().includes(search))
    : items;

  const rowHtml = (i) => {
    const qty = Number(deliveryDraft[i.id]) || 0;
    const newTotal = (Number(i.quantity) || 0) + qty;
    return `
      <div class="delivery-row" style="display:grid; grid-template-columns: 1fr auto; gap:8px; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border);">
        <div style="min-width:0;">
          <div style="font-weight:600; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(i.name)}</div>
          <div style="font-size:0.72rem; color:var(--text-light);">${esc(i.category || '')} · stock <b>${i.quantity}</b> ${esc(i.unit || '')} ${qty > 0 ? `→ <b style="color:#10b981;">${newTotal}</b>` : ''}</div>
        </div>
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="0"
          value="${qty || ''}"
          data-item-id="${i.id}"
          oninput="updateDeliveryDraft('${i.id}', this.value)"
          style="width:72px; padding:6px 8px; text-align:right; border:1px solid var(--border); border-radius:6px; font-size:0.9rem;">
      </div>`;
  };

  const selectedCount = Object.keys(deliveryDraft).filter(k => Number(deliveryDraft[k]) > 0).length;
  const totalUnits = Object.values(deliveryDraft).reduce((sum, v) => sum + (Number(v) || 0), 0);
  const notesVal = (document.getElementById('deliveryNotesInput') && document.getElementById('deliveryNotesInput').value) || '';

  openModal(`
    <div class="modal-header">
      <h3>Record New Delivery</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <p style="font-size:0.8rem; color:var(--text-light); margin-bottom:10px; line-height:1.5;">
      Enter the quantity delivered for each item. The submission goes to ASM for approval, then the approved quantities are <b>added</b> to current stock.
    </p>
    <input class="form-control" id="deliverySearchInput" placeholder="Search items..." value="${esc(searchRaw)}" oninput="rerenderDeliveryList()" style="margin-bottom:10px;">
    <div style="max-height:45vh; overflow:auto; border:1px solid var(--border); border-radius:8px; margin-bottom:10px;">
      ${filtered.length ? filtered.map(rowHtml).join('') : '<div style="padding:20px; text-align:center; color:var(--text-light); font-size:0.88rem;">No items match your search.</div>'}
    </div>
    <textarea class="form-control" id="deliveryNotesInput" placeholder="Notes (optional) — PO number, supplier, etc." rows="2" oninput="noteDeliveryNotes()" style="margin-bottom:10px; font-size:0.85rem;">${esc(notesVal)}</textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 2px; font-size:0.82rem; color:var(--text-light);">
      <span><b style="color:var(--text);">${selectedCount}</b> item${selectedCount !== 1 ? 's' : ''} · <b style="color:var(--text);">${totalUnits}</b> unit${totalUnits !== 1 ? 's' : ''}</span>
      <button class="btn btn-outline" onclick="clearDeliveryDraft()" style="padding:4px 12px; font-size:0.78rem;">Clear</button>
    </div>
    <button class="btn btn-primary btn-block" id="sendDeliveryBtn" onclick="sendDeliveryToASM()" ${selectedCount === 0 ? 'disabled' : ''}>
      Send to ASM for approval
    </button>
  `);

  const si = document.getElementById('deliverySearchInput');
  if (si && searchRaw) { si.focus(); si.setSelectionRange(searchRaw.length, searchRaw.length); }
}

// Live update the draft as the user types a qty. Re-render the summary line
// without redrawing the whole list to avoid losing input focus.
function updateDeliveryDraft(itemId, val) {
  const n = Math.max(0, parseInt(val, 10) || 0);
  if (n > 0) deliveryDraft[itemId] = n;
  else delete deliveryDraft[itemId];
  // Cheap partial update: just refresh the summary line + send button state
  const selectedCount = Object.keys(deliveryDraft).filter(k => Number(deliveryDraft[k]) > 0).length;
  const sendBtn = document.getElementById('sendDeliveryBtn');
  if (sendBtn) sendBtn.disabled = selectedCount === 0;
}

// The notes input is uncontrolled (we read its value on submit) — this function
// exists so the onchange attribute is harmless if the element is later rebound.
function noteDeliveryNotes() { /* no-op */ }

function rerenderDeliveryList() { renderRecordDeliveryModal(); }

function clearDeliveryDraft() {
  deliveryDraft = {};
  renderRecordDeliveryModal();
}

// Welfare (or ASM) sends the draft delivery to cloud as pending
async function sendDeliveryToASM() {
  const btn = document.getElementById('sendDeliveryBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sending…'; }
  // Read notes value before the modal is torn down
  const notesEl = document.getElementById('deliveryNotesInput');
  const notes = notesEl ? (notesEl.value || '').trim() : '';
  const ok = await submitDeliveryToASM(notes);
  if (ok) {
    closeModal();
  } else if (btn) {
    btn.disabled = false;
    btn.textContent = 'Send to ASM for approval';
  }
}

async function submitDeliveryToASM(notes) {
  const items = getItems();
  const lines = Object.keys(deliveryDraft)
    .map(id => {
      const qty = Number(deliveryDraft[id]) || 0;
      if (qty <= 0) return null;
      const it = items.find(x => x.id === id);
      if (!it) return null;
      return { id: it.id, name: it.name, category: it.category, unit: it.unit, qty };
    })
    .filter(Boolean);
  if (!lines.length) {
    toast('No items entered — type a quantity next to at least one item', 'warning');
    return false;
  }
  const totalUnits = lines.reduce((s, l) => s + l.qty, 0);
  const payload = {
    submitted_by: (currentUser && currentUser.email) || 'unknown',
    items: lines,
    notes: notes || null,
    summary: { totalItems: lines.length, totalUnits },
    status: 'pending'
  };
  showSyncStatus('syncing');
  console.log('[deliveries] Submitting delivery with', lines.length, 'items,', totalUnits, 'units as', payload.submitted_by);
  const { data: inserted, error } = await sb
    .from('deliveries')
    .insert(payload)
    .select('*')
    .single();
  if (error) {
    console.error('submitDeliveryToASM failed:', error);
    showSyncStatus('error');
    const msg = error.message || 'unknown error';
    // Give a hint if the table doesn't exist yet
    if (/does not exist|relation .* does not exist/i.test(msg)) {
      toast('Deliveries table not set up yet — run supabase-setup.sql in the SQL Editor', 'error');
    } else {
      toast('Could not send delivery: ' + msg, 'error');
    }
    return false;
  }
  if (!inserted || !inserted.id) {
    showSyncStatus('error');
    toast('Submit blocked by database — re-run supabase-setup.sql', 'error');
    return false;
  }
  console.log('[deliveries] Submitted OK — row id:', inserted.id, 'status:', inserted.status);
  showSyncStatus('synced');
  toast(`Delivery sent to ASM for approval (${totalUnits} unit${totalUnits !== 1 ? 's' : ''})`, 'success');
  deliveryDraft = {};
  return true;
}

// Pull all pending delivery submissions
async function pullDeliverySubmissions() {
  const { data, error } = await sb
    .from('deliveries')
    .select('*')
    .eq('status', 'pending')
    .order('submitted_at', { ascending: false });
  if (error) { console.warn('Pull pending deliveries failed:', error); return []; }
  return data || [];
}

async function getDeliverySubmission(id) {
  const { data, error } = await sb.from('deliveries').select('*').eq('id', id).single();
  if (error) { console.warn('Get delivery failed:', error); return null; }
  return data;
}

// Same verified-update pattern as markSubmissionStatus but for deliveries
async function markDeliveryStatus(id, newStatus, extraFields) {
  const payload = Object.assign({
    status: newStatus,
    applied_by: (currentUser && currentUser.email) || 'unknown',
    applied_at: new Date().toISOString()
  }, extraFields || {});
  console.log('[deliveries] Marking', id, '→', newStatus, 'as', payload.applied_by);
  const { data, error } = await sb
    .from('deliveries')
    .update(payload)
    .eq('id', id)
    .select('*');
  if (error) {
    console.error(`[deliveries] Mark ${newStatus} failed:`, error);
    toast(`Could not mark ${newStatus}: ` + (error.message || 'database error'), 'error');
    return false;
  }
  if (data && data.length) return true;
  console.warn(`[deliveries] Mark ${newStatus} returned no rows — verifying via read-back`);
  const { data: check, error: checkErr } = await sb
    .from('deliveries').select('id,status').eq('id', id).maybeSingle();
  if (checkErr) {
    toast(`Could not verify ${newStatus}: ` + (checkErr.message || 'database error'), 'error');
    return false;
  }
  if (!check) { toast('Delivery not found', 'warning'); return true; }
  if (check.status === newStatus) return true;
  toast(`Database blocked the update (status still "${check.status}"). Re-run supabase-setup.sql.`, 'error');
  return false;
}

async function finishDeliveryAndContinue(successToast, successType) {
  closeModal();
  if (typeof renderInventory === 'function') { try { renderInventory(); } catch(_) {} }
  await refreshPendingDeliveriesBanner();
  const remaining = await pullDeliverySubmissions();
  toast(successToast, successType || 'success');
  if (remaining.length) {
    setTimeout(() => { try { openPendingDeliveries(); } catch(_) {} }, 350);
  } else {
    setTimeout(() => { toast('All deliveries processed', 'success'); }, 450);
  }
}

// ASM applies a delivery: ADDS qty to each item's existing stock
async function applyDeliverySubmission(id) {
  console.log('[deliveries] applyDeliverySubmission called for', id);
  if (!requireASM('Only ASM can apply a delivery')) return;
  try {
    const sub = await getDeliverySubmission(id);
    if (!sub) { toast('Delivery not found', 'error'); return; }
    if (sub.status !== 'pending') {
      toast('This delivery has already been processed', 'warning');
      await refreshPendingDeliveriesBanner();
      closeModal();
      const remaining = await pullDeliverySubmissions();
      if (remaining.length) setTimeout(() => openPendingDeliveries(), 250);
      return;
    }
    const lines = sub.items || [];
    const allItems = getItems();
    const affected = [];
    lines.forEach(l => {
      const idx = allItems.findIndex(x => x.id === l.id);
      if (idx < 0) {
        console.warn('[deliveries] Item not found locally — skipped:', l.id, l.name);
        return;
      }
      const before = Number(allItems[idx].quantity) || 0;
      const add = Number(l.qty) || 0;
      if (add <= 0) return;
      const after = before + add;
      affected.push({ id: l.id, name: allItems[idx].name, from: before, add, to: after });
      allItems[idx].quantity = after;
    });
    console.log(`[deliveries] Apply: ${affected.length} of ${lines.length} lines will change`, affected);
    if (!affected.length) {
      const ok = await markDeliveryStatus(id, 'applied', { note: 'No matching items — nothing added' });
      if (!ok) return;
      await finishDeliveryAndContinue('Delivery marked applied — no matching items', 'warning');
      return;
    }
    const pushPromises = affected.map(a => {
      const full = allItems.find(x => x.id === a.id);
      return Promise.resolve(pushItem(full)).catch(e => ({ _syncError: e, name: a.name }));
    });
    saveItems(allItems);
    const results = await Promise.all(pushPromises);
    const failed = results.filter(r => r && r._syncError);
    const marked = await markDeliveryStatus(id, 'applied');
    if (!marked) {
      toast('Stock updated but delivery could not be marked applied — will still show until cleared', 'warning');
      return;
    }
    if (failed.length) {
      toast(`${failed.length} item(s) failed cloud sync — they will retry`, 'warning');
    }
    const totalAdded = affected.reduce((s, a) => s + a.add, 0);
    await finishDeliveryAndContinue(`Added ${totalAdded} unit${totalAdded !== 1 ? 's' : ''} across ${affected.length} item${affected.length !== 1 ? 's' : ''}`);
  } catch (err) {
    console.error('[deliveries] applyDeliverySubmission failed:', err);
    toast('Could not apply delivery: ' + (err && err.message ? err.message : 'unknown error'), 'error');
  }
}

async function dismissDeliverySubmission(id) {
  if (!requireASM('Only ASM can dismiss a delivery')) return;
  // Optimistic: fade the card out immediately. Re-render on failure.
  fadeOutSubmissionCard(id);
  toast('Dismissing delivery…', 'info', 1200);
  const ok = await markDeliveryStatus(id, 'dismissed');
  if (!ok) {
    if (typeof openPendingDeliveries === 'function') {
      try { await openPendingDeliveries(); } catch(_) {}
    }
    return;
  }
  await finishDeliveryAndContinue('Delivery dismissed');
}

      <div class="submission-card">

async function reviewDelivery(id) {
  console.log('[deliveries] reviewDelivery called for', id);
  openModal(`
    <div class="modal-header">
      <h3>Loading delivery…</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div style="text-align:center; padding:40px 20px;">
      <span class="spinner"></span>
      <div style="margin-top:12px; color:var(--text-light); font-size:0.9rem;">Fetching delivery details…</div>
    </div>
  `);
  let sub;
  try { sub = await getDeliverySubmission(id); }
  catch (err) {
    toast('Could not load delivery: ' + (err && err.message ? err.message : 'network error'), 'error');
    closeModal(); return;
  }
  if (!sub) {
    toast('Could not load delivery', 'error');
    closeModal();
    setTimeout(() => openPendingDeliveries(), 250);
    return;
  }
  if (sub.status !== 'pending') {
    toast(`This delivery was already ${sub.status}`, 'warning');
    closeModal();
    await refreshPendingDeliveriesBanner();
    setTimeout(() => openPendingDeliveries(), 250);
    return;
  }
  const lines = sub.items || [];
  const allItems = getItems();
  const submitter = esc(sub.submitted_by || 'unknown');
  const when = new Date(sub.submitted_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
  const totalUnits = (sub.summary && sub.summary.totalUnits) || lines.reduce((sum, l) => sum + (Number(l.qty) || 0), 0);

  const rowHtml = (l) => {
    const found = allItems.find(x => x.id === l.id);
    const currentStock = found ? (Number(found.quantity) || 0) : null;
    const add = Number(l.qty) || 0;
    const missing = !found;
    const newTotal = currentStock !== null ? currentStock + add : null;
    return `
      <div class="var-item-row">
        <span class="nm">${esc(l.name)}${missing ? ' <span style="color:#ef4444; font-size:0.7rem;">(not in inventory)</span>' : ''}</span>
        <span class="delta pos">+${add}</span>
        <span class="pct ${missing ? '' : 'pos'}">${missing ? '—' : `${currentStock} → <b>${newTotal}</b>`}</span>
      </div>`;
  };

  const missingCount = lines.filter(l => !allItems.find(x => x.id === l.id)).length;

  openModal(`
    <div class="modal-header">
      <h3>Review Delivery</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="var-report-date">
      From <b style="color:var(--text);">${submitter}</b> &middot; ${when} &middot; ${lines.length} item${lines.length !== 1 ? 's' : ''}
    </div>
    ${sub.notes ? `<div style="background:var(--bg); padding:10px 12px; border-radius:8px; font-size:0.82rem; color:var(--text); margin:10px 0; border-left:3px solid var(--primary);">${esc(sub.notes)}</div>` : ''}

    <div class="var-kpi-grid">
      <div class="var-kpi good">
        <div class="var-kpi-val">+${totalUnits}</div>
        <div class="var-kpi-lbl">Units delivered</div>
      </div>
      <div class="var-kpi">
        <div class="var-kpi-val">${lines.length}</div>
        <div class="var-kpi-lbl">Items</div>
      </div>
      <div class="var-kpi ${missingCount > 0 ? 'neg' : 'good'}">
        <div class="var-kpi-val">${missingCount}</div>
        <div class="var-kpi-lbl">Not in inventory</div>
      </div>
    </div>

    <div class="var-section-title">All delivered items</div>
    ${lines.map(rowHtml).join('')}

    <div style="display:flex; gap:8px; margin-top:18px;">
      <button class="btn btn-outline" style="flex:1;" onclick="openPendingDeliveries()">Back</button>
      <button class="btn btn-danger" id="delivDismissBtn" onclick="handleDeliveryDismiss('${sub.id}')">Dismiss</button>
      <button class="btn btn-warning" style="flex:1;" id="delivApplyBtn" onclick="handleDeliveryApply('${sub.id}')">Add to Stock</button>
    </div>
  `);

async function handleDeliveryApply(id) {
  const applyBtn = document.getElementById('delivApplyBtn');
  const dismissBtn = document.getElementById('delivDismissBtn');
  if (applyBtn) { applyBtn.disabled = true; applyBtn.innerHTML = '<span class="spinner"></span> Adding…'; }
  if (dismissBtn) dismissBtn.disabled = true;
  try { await applyDeliverySubmission(id); }
  finally {
    const still = document.getElementById('delivApplyBtn');
    if (still) { still.disabled = false; still.innerHTML = 'Add to Stock';
      const d = document.getElementById('delivDismissBtn');
      if (d) d.disabled = false;
    }
  }
}

async function handleDeliveryDismiss(id) {
  const applyBtn = document.getElementById('delivApplyBtn');
  const dismissBtn = document.getElementById('delivDismissBtn');
  if (dismissBtn) { dismissBtn.disabled = true; dismissBtn.innerHTML = '<span class="spinner"></span> Dismissing…'; }
  if (applyBtn) applyBtn.disabled = true;
  try { await dismissDeliverySubmission(id); }
  finally {
    const still = document.getElementById('delivDismissBtn');
    if (still) { still.disabled = false; still.innerHTML = 'Dismiss';
      const a = document.getElementById('delivApplyBtn');
      if (a) a.disabled = false;
    }
  }
}

// Updates the delivery banner on the Stock tab AND the red badge on the Stock
// nav button (visible from any tab). ASM only.
async function refreshPendingDeliveriesBanner() {
  const el = document.getElementById('pendingDeliveriesBanner');

  const setBadge = (n) => {

function handleDeliveryChange(payload) {
